<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staffing Intelligence | Set Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:    #0F0F10;
      --bg-card:    #1E1E22;
      --bg-surface: #18181B;
      --accent:     #86BC25;
      --accent-hover: #75A521;
      --accent-muted: rgba(134,188,37,0.15);
      --text-primary:   #F4F4F5;
      --text-secondary: #A1A1AA;
      --border-default: rgba(255,255,255,0.10);
      --border-subtle:  rgba(255,255,255,0.06);
    }

    body {
      font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-top: 2px solid var(--accent);
      border-radius: 12px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .heading {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .subheading {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .email-display {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-secondary);
      font-family: 'Open Sans', sans-serif;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]::placeholder { color: rgba(255,255,255,0.25); }
    input[type="password"]:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      background: var(--accent);
      color: #0F0F10;
      border: none;
      border-radius: 6px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(134,188,37,0.4);
      border-radius: 6px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: center;
      text-decoration: none;
    }

    .btn-secondary:hover { background: var(--accent-muted); border-color: rgba(134,188,37,0.7); }

    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(218,41,28,0.1);
      border: 1px solid rgba(218,41,28,0.25);
      border-radius: 6px;
      font-size: 13px;
      color: #DA291C;
      line-height: 1.4;
    }

    .error-msg.visible { display: block; }

    .error-panel { display: none; }
    .error-panel.visible { display: block; }

    .success-panel {
      display: none;
      text-align: center;
    }

    .success-panel.visible { display: block; }

    .success-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-muted);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .success-panel h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .success-panel p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0F0F10;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="8" r="3.8" fill="#86BC25"/>
        <path d="M7.5 24c0-4.142 3.358-7.5 7.5-7.5s7.5 3.358 7.5 7.5" stroke="#86BC25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="10.5" r="2.6" fill="#86BC25" opacity="0.5"/>
        <path d="M1 24c0-2.761 2.239-5 5-5" stroke="#86BC25" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <circle cx="24" cy="10.5" r="2.6" fill="#86BC25" opacity="0.5"/>
        <path d="M29 24c0-2.761-2.239-5-5-5" stroke="#86BC25" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <span class="brand-text">Staffing Intelligence</span>
    </div>

    <!-- Loading state -->
    <div id="loadingPanel">
      <div style="color:#8892B0;font-size:14px;text-align:center;padding:16px 0">Validating invite link…</div>
    </div>

    <!-- Error state -->
    <div id="errorPanel" class="error-panel">
      <div class="heading" id="errorHeading">Link Expired</div>
      <div class="subheading" id="errorMessage">This invite link has expired or was already used.</div>
      <div style="font-size:13px;color:#8892B0;line-height:1.6;margin-top:4px;">
        To get a new link, contact your admin:<br>
        <a href="mailto:vaprabhakar@deloitte.com?subject=Staffing%20Intelligence%20%E2%80%94%20Need%20new%20invite%20link"
           style="color:#86BC25;font-weight:600;">vaprabhakar@deloitte.com</a>
      </div>
    </div>

    <!-- Set password form -->
    <div id="formPanel" style="display:none">
      <div class="heading">Welcome to Staffing Intelligence</div>
      <div class="subheading" id="welcomeSubheading">Set a password for your account.</div>

      <form id="setPasswordForm" novalidate>
        <div class="field">
          <label>Email</label>
          <div class="email-display" id="emailDisplay"></div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" autocomplete="new-password" required>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Set Password &amp; Sign In</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>

    <!-- Success state -->
    <div id="successPanel" class="success-panel">
      <div class="success-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="#86BC25" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Password set!</h2>
      <p>Redirecting to login…</p>
    </div>

  </div>

  <script>
  (async function init() {
    const params    = new URLSearchParams(window.location.search);
    const token     = params.get('invite');

    const loadingEl = document.getElementById('loadingPanel');
    const errorEl   = document.getElementById('errorPanel');
    const formEl    = document.getElementById('formPanel');

    function showError(heading, message) {
      loadingEl.style.display = 'none';
      document.getElementById('errorHeading').textContent  = heading;
      document.getElementById('errorMessage').textContent  = message;
      errorEl.classList.add('visible');
    }

    if (!token) {
      showError('Invalid Link', 'No invite token found. Contact your admin.');
      return;
    }

    // Validate token server-side
    let validateData;
    try {
      const res = await fetch('/api/auth/validate-invite', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token }),
      });
      validateData = await res.json();
    } catch (err) {
      showError('Network Error', 'Could not validate invite link. Please try again.');
      return;
    }

    if (!validateData.valid) {
      const reason = validateData.reason || 'Invalid or expired invite link.';
      showError('Link Expired', reason);
      return;
    }

    // Show form
    loadingEl.style.display = 'none';
    formEl.style.display = 'block';

    const roleLabels = {
      admin: 'Admin', resource_manager: 'Resource Manager',
      project_manager: 'Project Manager', executive: 'Executive', consultant: 'Consultant'
    };
    const roleLabel = roleLabels[validateData.role] || validateData.role || 'team member';
    document.getElementById('welcomeSubheading').textContent =
      `You've been invited to join ${validateData.tenantName} as ${roleLabel}.`;
    document.getElementById('emailDisplay').textContent = validateData.email || '';

    document.getElementById('setPasswordForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn             = document.getElementById('submitBtn');
      const errorMsgEl      = document.getElementById('errorMsg');

      errorMsgEl.textContent = '';
      errorMsgEl.classList.remove('visible');

      if (password.length < 8) {
        errorMsgEl.textContent = 'Password must be at least 8 characters.';
        errorMsgEl.classList.add('visible');
        return;
      }

      if (password !== confirmPassword) {
        errorMsgEl.textContent = 'Passwords do not match.';
        errorMsgEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Setting password…';

      try {
        const res = await fetch('/api/auth/set-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsgEl.textContent = data.error || 'Failed to set password. Please try again.';
          errorMsgEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Set Password & Sign In';
          return;
        }

        formEl.style.display = 'none';
        document.getElementById('successPanel').classList.add('visible');
        setTimeout(() => { window.location.href = '/login.html'; }, 2000);
      } catch (err) {
        errorMsgEl.textContent = 'Network error. Please try again.';
        errorMsgEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Set Password & Sign In';
      }
    });
  })();
  </script>

</body>
</html>
