<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staffing Intelligence | Set Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:    #0F0F10;
      --bg-card:    #1E1E22;
      --bg-surface: #18181B;
      --accent:     #86BC25;
      --accent-hover: #75A521;
      --accent-muted: rgba(134,188,37,0.15);
      --text-primary:   #F4F4F5;
      --text-secondary: #A1A1AA;
      --border-default: rgba(255,255,255,0.10);
      --border-subtle:  rgba(255,255,255,0.06);
    }

    body {
      font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-top: 2px solid var(--accent);
      border-radius: 12px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .heading {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .subheading {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]::placeholder { color: rgba(255,255,255,0.25); }
    input[type="password"]:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      background: var(--accent);
      color: #0F0F10;
      border: none;
      border-radius: 6px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(134,188,37,0.4);
      border-radius: 6px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: center;
      text-decoration: none;
    }

    .btn-secondary:hover { background: var(--accent-muted); border-color: rgba(134,188,37,0.7); }

    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(218,41,28,0.1);
      border: 1px solid rgba(218,41,28,0.25);
      border-radius: 6px;
      font-size: 13px;
      color: #DA291C;
      line-height: 1.4;
    }

    .error-msg.visible { display: block; }

    .success-panel {
      display: none;
      text-align: center;
    }

    .success-panel.visible { display: block; }

    .success-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-muted);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .success-panel h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .success-panel p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="8" r="3.8" fill="#86BC25"/>
        <path d="M7.5 24c0-4.142 3.358-7.5 7.5-7.5s7.5 3.358 7.5 7.5" stroke="#86BC25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="10.5" r="2.6" fill="#86BC25" opacity="0.5"/>
        <path d="M1 24c0-2.761 2.239-5 5-5" stroke="#86BC25" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <circle cx="24" cy="10.5" r="2.6" fill="#86BC25" opacity="0.5"/>
        <path d="M29 24c0-2.761-2.239-5-5-5" stroke="#86BC25" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <span class="brand-text">Staffing Intelligence</span>
    </div>

    <!-- Error state: no token -->
    <div id="noTokenPanel">
      <div class="heading">Invalid Link</div>
      <div class="subheading" style="margin-bottom:0">Invalid or expired invite link. Please contact your admin for a new one.</div>
    </div>

    <!-- Set password form -->
    <div id="formPanel" style="display:none">
      <div class="heading">Set Your Password</div>
      <div class="subheading">Welcome to Staffing Intelligence</div>

      <form id="setPasswordForm" novalidate>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" autocomplete="new-password" required>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Set Password</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>

    <!-- Success state -->
    <div id="successPanel" class="success-panel">
      <div class="success-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="#86BC25" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Password set successfully!</h2>
      <p>You can now sign in to Staffing Intelligence with your new password.</p>
      <a href="/login.html" class="btn-secondary">Go to Login</a>
    </div>

  </div>

  <script>
    (function init() {
      const hash   = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      const token  = params.get('access_token');
      const type   = params.get('type');

      if (!token || type !== 'invite') {
        document.getElementById('noTokenPanel').style.display = 'block';
        return;
      }

      document.getElementById('noTokenPanel').style.display = 'none';
      document.getElementById('formPanel').style.display    = 'block';

      document.getElementById('setPasswordForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const password        = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const btn             = document.getElementById('submitBtn');
        const errorEl         = document.getElementById('errorMsg');

        errorEl.textContent = '';
        errorEl.classList.remove('visible');

        if (password.length < 8) {
          errorEl.textContent = 'Password must be at least 8 characters.';
          errorEl.classList.add('visible');
          return;
        }

        if (password !== confirmPassword) {
          errorEl.textContent = 'Passwords do not match.';
          errorEl.classList.add('visible');
          return;
        }

        btn.disabled    = true;
        btn.textContent = 'Setting password…';

        try {
          const res = await fetch('/api/auth/set-password', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ access_token: token, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            errorEl.textContent = data.error || 'Failed to set password. Please try again.';
            errorEl.classList.add('visible');
            btn.disabled    = false;
            btn.textContent = 'Set Password';
            return;
          }

          document.getElementById('formPanel').style.display    = 'none';
          document.getElementById('successPanel').classList.add('visible');
        } catch (err) {
          errorEl.textContent = 'Network error. Please try again.';
          errorEl.classList.add('visible');
          btn.disabled    = false;
          btn.textContent = 'Set Password';
        }
      });
    })();
  </script>

</body>
</html>
