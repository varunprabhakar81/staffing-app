<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staffing Intelligence | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:    #0F0F10;
      --bg-card:    #1E1E22;
      --bg-surface: #18181B;
      --accent:     #86BC25;
      --accent-hover: #75A521;
      --accent-muted: rgba(134,188,37,0.15);
      --text-primary:   #F4F4F5;
      --text-secondary: #A1A1AA;
      --border-default: rgba(255,255,255,0.10);
      --border-subtle:  rgba(255,255,255,0.06);
    }

    body {
      font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-top: 2px solid var(--accent);
      border-radius: 12px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ── Heading ── */
    .heading {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .subheading {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: rgba(255,255,255,0.25);
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      background: var(--accent);
      color: #0F0F10;
      border: none;
      border-radius: 6px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-login:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Error message ── */
    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(218,41,28,0.1);
      border: 1px solid rgba(218,41,28,0.25);
      border-radius: 6px;
      font-size: 13px;
      color: #DA291C;
      line-height: 1.4;
    }

    .error-msg.visible { display: block; }

    /* ── Success message ── */
    .success-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(134,188,37,0.1);
      border: 1px solid rgba(134,188,37,0.25);
      border-radius: 6px;
      font-size: 13px;
      color: #86BC25;
      line-height: 1.4;
    }

    .success-msg.visible { display: block; }

    /* ── Forgot password link ── */
    .forgot-link {
      display: block;
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Open Sans', -apple-system, sans-serif;
      text-decoration: underline;
      text-decoration-color: transparent;
      transition: color 0.15s, text-decoration-color 0.15s;
    }

    .forgot-link:hover { color: var(--accent-hover); text-decoration-color: var(--accent-hover); }

    /* ── Forgot password inline form ── */
    .forgot-form {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .forgot-form.visible { display: block; }

    .forgot-form .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── "Back to sign in" link — clearly visible ── */
    .back-link {
      display: block;
      margin-top: 14px;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Open Sans', -apple-system, sans-serif;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent-hover); }

    .btn-reset {
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(134,235,34,0.4);
      border-radius: 6px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-reset:hover:not(:disabled) {
      background: var(--accent-muted);
      border-color: rgba(134,235,34,0.7);
    }

    .btn-reset:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="8" r="3.8" fill="#86BC25"/>
        <path d="M7.5 24c0-4.142 3.358-7.5 7.5-7.5s7.5 3.358 7.5 7.5" stroke="#86BC25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="10.5" r="2.6" fill="#86BC25" opacity="0.5"/>
        <path d="M1 24c0-2.761 2.239-5 5-5" stroke="#86BC25" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <circle cx="24" cy="10.5" r="2.6" fill="#86BC25" opacity="0.5"/>
        <path d="M29 24c0-2.761-2.239-5-5-5" stroke="#86BC25" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <span class="brand-text">Staffing Intelligence</span>
    </div>

    <div class="heading">Sign in</div>
    <div class="subheading">Enter your credentials to continue</div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Sign in</button>

      <div class="error-msg" id="errorMsg"></div>
    </form>

    <button class="forgot-link" id="forgotToggle">Forgot password?</button>

    <div class="forgot-form" id="forgotForm">
      <div class="section-label">Reset password</div>
      <div class="field">
        <label for="resetEmail">Email</label>
        <input type="email" id="resetEmail" name="resetEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <button type="button" class="btn-reset" id="resetBtn">Send reset link</button>
      <div class="success-msg" id="resetSuccess"></div>
      <div class="error-msg" id="resetError"></div>
    </div>

  </div>

  <script>
    // ── On load: redirect to app if session is already active ────────────────
    (async function checkSession() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (res.ok) {
          window.location.replace('/index.html');
        }
      } catch (_) {
        // No session — stay on login page
      }
    })();

    // ── Login form submit ─────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errorEl  = document.getElementById('errorMsg');

      // Clear previous error
      errorEl.textContent = '';
      errorEl.classList.remove('visible');

      if (!email || !password) {
        errorEl.textContent = 'Email and password are required.';
        errorEl.classList.add('visible');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method:      'POST',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json' },
          body:        JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Success — go to the app
        window.location.replace('/index.html');

      } catch (err) {
        errorEl.textContent = err.message || 'An unexpected error occurred. Please try again.';
        errorEl.classList.add('visible');
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      }
    });
    // ── Forgot password ───────────────────────────────────────────────────────
    document.getElementById('forgotToggle').addEventListener('click', function () {
      const form = document.getElementById('forgotForm');
      const isVisible = form.classList.contains('visible');
      form.classList.toggle('visible', !isVisible);
      this.textContent = isVisible ? 'Forgot password?' : 'Back to sign in';
      // Clear state when toggling
      document.getElementById('resetSuccess').classList.remove('visible');
      document.getElementById('resetError').classList.remove('visible');
      document.getElementById('resetEmail').value = '';
    });

    document.getElementById('resetBtn').addEventListener('click', async function () {
      const email     = document.getElementById('resetEmail').value.trim();
      const successEl = document.getElementById('resetSuccess');
      const errorEl   = document.getElementById('resetError');

      successEl.classList.remove('visible');
      errorEl.classList.remove('visible');

      if (!email) {
        errorEl.textContent = 'Please enter your email address.';
        errorEl.classList.add('visible');
        return;
      }

      this.disabled    = true;
      this.textContent = 'Sending…';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });

        // Always show generic success to avoid email enumeration
        successEl.textContent = 'If an account exists for that email, a reset link has been sent.';
        successEl.classList.add('visible');
        this.disabled    = true;
        this.textContent = 'Link sent';
      } catch (err) {
        errorEl.textContent = 'Could not send reset email. Please try again.';
        errorEl.classList.add('visible');
        this.disabled    = false;
        this.textContent = 'Send reset link';
      }
    });
  </script>

</body>
</html>
