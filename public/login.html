<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staffing Intelligence | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0F1117;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1A1D27;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-text {
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: -0.01em;
    }

    /* ── Heading ── */
    .heading {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 6px;
    }

    .subheading {
      font-size: 13px;
      color: #8892B0;
      margin-bottom: 28px;
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #8892B0;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #0F1117;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #FFFFFF;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: #4A5568;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #A8C7FA;
    }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      background: #A8C7FA;
      color: #0F1117;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-login:hover:not(:disabled) { opacity: 0.88; }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Error message ── */
    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(255, 179, 179, 0.1);
      border: 1px solid rgba(255, 179, 179, 0.25);
      border-radius: 8px;
      font-size: 13px;
      color: #FFB3B3;
      line-height: 1.4;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="8" r="3.8" fill="#A8C7FA"/>
        <path d="M7.5 24c0-4.142 3.358-7.5 7.5-7.5s7.5 3.358 7.5 7.5" stroke="#A8C7FA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="10.5" r="2.6" fill="#A8C7FA" opacity="0.5"/>
        <path d="M1 24c0-2.761 2.239-5 5-5" stroke="#A8C7FA" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <circle cx="24" cy="10.5" r="2.6" fill="#A8C7FA" opacity="0.5"/>
        <path d="M29 24c0-2.761-2.239-5-5-5" stroke="#A8C7FA" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <span class="brand-text">Staffing Intelligence</span>
    </div>

    <div class="heading">Sign in</div>
    <div class="subheading">Enter your credentials to continue</div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Sign in</button>

      <div class="error-msg" id="errorMsg"></div>
    </form>

  </div>

  <script>
    // ── On load: redirect to app if session is already active ────────────────
    (async function checkSession() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (res.ok) {
          window.location.replace('/index.html');
        }
      } catch (_) {
        // No session — stay on login page
      }
    })();

    // ── Login form submit ─────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errorEl  = document.getElementById('errorMsg');

      // Clear previous error
      errorEl.textContent = '';
      errorEl.classList.remove('visible');

      if (!email || !password) {
        errorEl.textContent = 'Email and password are required.';
        errorEl.classList.add('visible');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method:      'POST',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json' },
          body:        JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Success — go to the app
        window.location.replace('/index.html');

      } catch (err) {
        errorEl.textContent = err.message || 'An unexpected error occurred. Please try again.';
        errorEl.classList.add('visible');
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>

</body>
</html>
