<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staffing Intelligence | Set New Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:    #0F0F10;
      --bg-card:    #1E1E22;
      --bg-surface: #18181B;
      --accent:     #86EB22;
      --accent-hover: #75D41E;
      --accent-muted: rgba(134,235,34,0.15);
      --text-primary:   #F4F4F5;
      --text-secondary: #A1A1AA;
      --border-default: rgba(255,255,255,0.10);
    }

    body {
      font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-top: 2px solid var(--accent);
      border-radius: 12px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .heading {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .subheading {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]::placeholder { color: rgba(255,255,255,0.25); }
    input[type="password"]:focus { border-color: var(--accent); }

    .btn-submit {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      background: var(--accent);
      color: #0F0F10;
      border: none;
      border-radius: 6px;
      font-family: 'Open Sans', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-submit:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(218,41,28,0.1);
      border: 1px solid rgba(218,41,28,0.25);
      border-radius: 6px;
      font-size: 13px;
      color: #DA291C;
      line-height: 1.4;
    }

    .error-msg.visible { display: block; }

    .success-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(134,188,37,0.1);
      border: 1px solid rgba(134,188,37,0.25);
      border-radius: 6px;
      font-size: 13px;
      color: #86BC25;
      line-height: 1.4;
    }

    .success-msg.visible { display: block; }

    .login-link {
      display: inline-block;
      margin-top: 8px;
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
    }

    .login-link:hover { color: var(--accent-hover); text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="8" r="3.8" fill="#86EB22"/>
        <path d="M7.5 24c0-4.142 3.358-7.5 7.5-7.5s7.5 3.358 7.5 7.5" stroke="#86EB22" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="10.5" r="2.6" fill="#86EB22" opacity="0.5"/>
        <path d="M1 24c0-2.761 2.239-5 5-5" stroke="#86EB22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <circle cx="24" cy="10.5" r="2.6" fill="#86EB22" opacity="0.5"/>
        <path d="M29 24c0-2.761-2.239-5-5-5" stroke="#86EB22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <span class="brand-text">Staffing Intelligence</span>
    </div>

    <div class="heading">Set new password</div>
    <div class="subheading" id="subheading">Choose a new password for your account.</div>

    <form id="resetForm" novalidate>
      <div class="field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="Min. 8 characters" autocomplete="new-password" required>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" autocomplete="new-password" required>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Update password</button>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>
    </form>

    <a class="login-link" href="/login.html" id="loginLink" style="display:none">Back to sign in</a>

  </div>

  <script>
    // ── Parse access_token from URL hash ──────────────────────────────────────
    const hash   = window.location.hash.slice(1); // remove leading #
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const tokenType   = params.get('type'); // 'recovery' for password reset links

    const errorEl   = document.getElementById('errorMsg');
    const successEl = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');
    const loginLink = document.getElementById('loginLink');

    if (!accessToken || tokenType !== 'recovery') {
      // No valid recovery token — show error and disable form
      document.getElementById('subheading').textContent = '';
      errorEl.textContent = 'Invalid or expired reset link. Please request a new one from the sign-in page.';
      errorEl.classList.add('visible');
      submitBtn.disabled = true;
      loginLink.style.display = 'inline-block';
    }

    // ── Form submit ───────────────────────────────────────────────────────────
    document.getElementById('resetForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      errorEl.textContent = '';
      errorEl.classList.remove('visible');
      successEl.classList.remove('visible');

      if (newPassword.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        errorEl.classList.add('visible');
        return;
      }

      if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.add('visible');
        return;
      }

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Updating…';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ access_token: accessToken, new_password: newPassword }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Failed to update password.');
        }

        // Success
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('subheading').textContent = '';
        successEl.textContent = 'Password updated successfully.';
        successEl.classList.add('visible');
        loginLink.style.display = 'inline-block';

      } catch (err) {
        errorEl.textContent = err.message || 'An unexpected error occurred. Please try again.';
        errorEl.classList.add('visible');
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Update password';
      }
    });
  </script>

</body>
</html>
